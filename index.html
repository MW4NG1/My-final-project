<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Study Planner - Home</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <div class="logo-container">
        <img src="logo.jpg" alt="Logo" class="logo" />
        <h1>SMART STUDY PLANNER</h1>
      </div>
      <nav>
        <a href="index.html">Home</a>
        <a href="add-task.html">Add Task</a>
        <a href="tasks.html">Tasks</a>
      </nav>
    </header>

    <main class="container">
      <section>
        <h2>WELCOME</h2>
        <p>Stay organized and manage your study tasks easily.</p>
      </section>

      <section class="stats-container">
        <h2>Quick Stats</h2>

        <div class="stats-grid">
          <div class="stat-box">
            <h3>Total Tasks</h3>
            <p id="taskCount">0</p>
          </div>

          <div class="stat-box">
            <h3>Completed</h3>
            <p id="completedCount">0</p>
          </div>

          <div class="stat-box">
            <h3>Progress</h3>
            <div class="progress-bar">
              <div id="progressFill"></div>
            </div>
            <p id="progress">0%</p>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2026 Smart Study Planner by Mwangi</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
